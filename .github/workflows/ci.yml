name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: CI required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      API_JWT_SECRET: ci-only-api-jwt-secret-at-least-32-bytes
      BETTER_AUTH_SECRET: ci-only-better-auth-secret-at-least-32-bytes
      BETTER_AUTH_URL: http://127.0.0.1:3100
      GROQ_VALIDATE_MODEL_ON_STARTUP: "false"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://127.0.0.1:3100
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      RUN_POSTGRES_INTEGRATION_TEST: "1"
      RUN_REDIS_INTEGRATION_TEST: "1"
      REDIS_URL: redis://127.0.0.1:6379/15
      TEST_DATABASE_ADMIN_URL: postgresql://postgres:password@127.0.0.1:5432/postgres
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.12.13

      - name: Install Python tooling
        run: |
          pipx install poetry==1.8.5
          pipx inject poetry poetry-plugin-export==1.8.0

      - name: Verify web
        working-directory: apps/web
        run: |
          npm ci --no-audit --no-fund
          npm audit --omit=dev --audit-level=high
          npm run lint
          npm run typecheck
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e:ci

      - name: Verify API dependencies and unit tests
        working-directory: apps/api
        run: |
          poetry install --no-interaction --no-ansi
          poetry export --without-hashes --without dev | pipx run pip-audit==2.10.1 -r /dev/stdin
          poetry run pytest -q -m "not integration"

      - name: Verify worker dependencies and tests
        working-directory: apps/worker
        run: |
          poetry install --no-interaction --no-ansi
          poetry export --without-hashes --without dev | pipx run pip-audit==2.10.1 -r /dev/stdin
          poetry run pytest -q

      - name: Verify Postgres and Redis integration paths
        working-directory: apps/api
        run: poetry run pytest -q -m integration

      - name: Verify container definitions
        env:
          GROQ_API_KEY: ci-placeholder
        run: |
          docker compose --profile infra --profile backend --profile frontend config --quiet
          docker build --check apps/api
          docker build --check apps/worker
          docker build --check apps/web

      - name: Scan secrets and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-version: 0.72.0
          scanners: misconfig,secret
          skip-dirs: apps/web/node_modules,apps/api/.venv,apps/worker/.venv
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
