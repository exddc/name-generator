groups:
  - name: domain-generator-model-cutover
    rules:
      - alert: DomainGeneratorModelNotFound
        expr: sum(increase(domain_generator_llm_requests_total{error_class="model_not_found"}[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: The configured Groq model was not found
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorUnsupportedModelParameter
        expr: sum(increase(domain_generator_llm_requests_total{error_class="unsupported_parameter"}[5m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Groq rejected a model-specific parameter
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorFallbackRateHigh
        expr: |
          sum(rate(domain_generator_llm_fallbacks_total[10m]))
          /
          clamp_min(sum(rate(domain_generator_llm_requests_total{outcome="success"}[10m])), 0.001)
          > 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: More than 1% of model requests are falling back
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorProviderErrorRateHigh
        expr: |
          sum(rate(domain_generator_llm_requests_total{outcome="error",error_class=~"provider_5xx|connection_error|timeout|model_unavailable"}[10m]))
          /
          clamp_min(sum(rate(domain_generator_llm_requests_total[10m])), 0.001)
          > 0.005
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Groq provider errors exceed 0.5%
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorCandidateContractFailure
        expr: sum(increase(domain_generator_llm_contract_failures_total[10m])) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: A model response violated the candidate schema
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorCandidateQualityLow
        expr: |
          sum(rate(domain_generator_llm_candidates_total{outcome="rejected"}[10m]))
          /
          clamp_min(sum(rate(domain_generator_llm_candidates_total[10m])), 0.001)
          > 0.10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: More than 10% of schema-valid candidates fail domain validation
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorModelLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(domain_generator_llm_request_duration_seconds_bucket[10m]))
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Model request p95 latency exceeds five seconds
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorEffectiveModelMissing
        expr: absent(domain_generator_llm_model_info{model="openai/gpt-oss-20b"}) == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: No instance reports GPT-OSS 20B as its effective configuration
          runbook: docs/model-cutover/tw-228-runbook.md

      - alert: DomainGeneratorProcessMemoryHigh
        expr: process_resident_memory_bytes{job="domain-generator-api"} > 1073741824
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: API resident memory exceeds 1 GiB
          runbook: docs/model-cutover/tw-228-runbook.md
